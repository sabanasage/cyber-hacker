<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-HACKER - Sign Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(to bottom, #f0f0f0, #e0f0e0);
            min-height: 100vh;
        }
        
        header {
            background-color: #006400;
            color: white;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 28px;
            font-weight: bold;
            
        }
        
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 30px;
            font-size: 18px;
            font-weight: 500;
        }
        
        .tagline {
            font-size: 14px;
            margin-top: 5px;
            opacity: 0.9;
        }
        
        .signup-container {
            max-width: 500px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px 50px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        input[type="email"],
        input[type="tel"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 2px solid #006400;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .checkbox {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            gap: 8px;
        }
        
        .checkbox input {
            width: auto;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .btn-signin {
            background-color: #f0f0f0;
            color:#333;
        }
        
        .btn-submit {
            background-color: #f0f0f0;
            color: #333;
            border: 1px solid #ccc;
        }
        
        footer {
            text-align: center;
            margin-top: 40px;
            color: #555;
            font-size: 14px;
        }
        
        .contact {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="logo">CYBER-HACKER</div>
            <div class="tagline">confidentiality is our confidence</div>
        </div>
        <nav>
            <a href="home.html">HOME</a>
            <a href="signin.html">COURSES</a>
            <a href="signin.html">SIGN IN</a>
        </nav>
    </header>

    <div class="signup-container">
        <h2>SIGN UP HERE:</h2>
        
        <label for="email">Enter your email address:</label>
        <input type="email" id="email" placeholder="">

        <label for="phone">enter your telephone:</label>
        <input type="tel" id="phone" placeholder="">

        <label for="password">Enter the password:</label>
        <input type="password" id="password" placeholder="">

        <div class="checkbox">
            <input type="checkbox" id="terms">
            <label for="terms">Accept Terms and policies</label>
        </div>

        <div class="buttons">
            <button class="btn-signin"><a href="signin.html">SIGN IN</a></button>
            <button class="btn-submit"><a href="dashboard.html">SUBMIT</a></button>
        </div>
    </div>

    <footer>
        <div class="contact">
            contact us: 07900010011<br>
            07888888888<br>
            email address: sabanasage@gmail.com
        </div>
        <div>
            ©copyright reserved 2026  @policies
        </div>
    </footer>

</body>
</html>
